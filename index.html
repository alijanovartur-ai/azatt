<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тамагочи PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07080f; --surface:#0e1020; --card:#131525; --card2:#181a2e;
  --border:#252840; --border2:#2e3158;
  --accent:#7c6dfa; --accentH:#9d91ff;
  --green:#26d97f; --pink:#f06292; --yellow:#ffca28; --blue:#42a5f5; --red:#ef5350;
  --text:#eef0ff; --text2:#8890c0; --text3:#555880;
  --r:16px; --r2:12px; --shadow:0 8px 32px rgba(0,0,0,.5);
  /* time-of-day tint */
  --tod-tint:rgba(0,0,0,0);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── BG ATMOSPHERE ── */
.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;transition:background 60s linear;}
.bg-glow::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,109,250,.13) 0%,transparent 70%);
  top:-200px;left:-150px;animation:gm1 20s ease-in-out infinite alternate;}
.bg-glow::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(240,98,146,.08) 0%,transparent 70%);
  bottom:-100px;right:-100px;animation:gm2 15s ease-in-out infinite alternate;}
@keyframes gm1{from{transform:translate(0,0)}to{transform:translate(100px,80px)}}
@keyframes gm2{from{transform:translate(0,0)}to{transform:translate(-70px,-90px)}}

.tod-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;background:var(--tod-tint);transition:background 3s linear;}
.dots-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:28px 28px;}

/* ── SCREENS ── */
.screen{position:relative;z-index:1;display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:20px;animation:screenIn .45s cubic-bezier(.4,0,.2,1);}
.screen.active{display:flex;}
@keyframes screenIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ══════ LOBBY ══════ */
#lobby{gap:0;text-align:center;}
.lobby-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(124,109,250,.12);border:1px solid rgba(124,109,250,.3);border-radius:50px;padding:5px 16px;font-size:.68rem;font-weight:800;color:var(--accentH);letter-spacing:2px;text-transform:uppercase;margin-bottom:22px;}

.lobby-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(3rem,10vw,6.5rem);font-weight:700;line-height:1;
  background:linear-gradient(135deg,#fff 0%,#c4baff 45%,#f06292 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.lobby-sub{font-size:.95rem;color:var(--text2);font-weight:600;letter-spacing:1px;margin-bottom:48px;}

/* showcase */
.lobby-showcase{position:relative;width:210px;height:210px;margin:0 auto 28px;}
.showcase-ring{position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg,var(--accent),var(--pink),var(--yellow),var(--green),var(--blue),var(--accent));
  padding:3px;animation:ringRot 4s linear infinite;}
@keyframes ringRot{to{transform:rotate(360deg)}}
.showcase-inner{width:100%;height:100%;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;}
.showcase-pet{font-size:5.8rem;animation:scBounce 2.2s ease-in-out infinite;filter:drop-shadow(0 0 24px rgba(124,109,250,.5));}
@keyframes scBounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-16px) scale(1.06)}}

.pet-selector{display:flex;gap:12px;justify-content:center;margin-bottom:36px;}
.pet-sel-btn{width:54px;height:54px;background:var(--card);border:2px solid var(--border2);border-radius:14px;cursor:pointer;font-size:1.7rem;display:flex;align-items:center;justify-content:center;transition:all .25s cubic-bezier(.4,0,.2,1);}
.pet-sel-btn:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 8px 20px rgba(124,109,250,.25);}
.pet-sel-btn.active{border-color:var(--accent);background:rgba(124,109,250,.15);box-shadow:0 0 22px rgba(124,109,250,.35);transform:translateY(-4px);}

.lobby-cta{display:inline-flex;align-items:center;gap:10px;padding:16px 42px;background:linear-gradient(135deg,var(--accent),#5a4de8);border:none;border-radius:50px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 8px 30px rgba(124,109,250,.45);transition:all .25s;animation:ctaP 3s ease-in-out infinite;}
@keyframes ctaP{0%,100%{box-shadow:0 8px 25px rgba(124,109,250,.4)}50%{box-shadow:0 8px 50px rgba(124,109,250,.75)}}
.lobby-cta:hover{transform:translateY(-3px) scale(1.03);}
.lobby-cta .arr{animation:arrB 1s ease-in-out infinite;}
@keyframes arrB{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}

/* achievements preview on lobby */
.lobby-stats-row{display:flex;gap:14px;margin-top:28px;flex-wrap:wrap;justify-content:center;}
.lobby-stat-chip{background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:50px;padding:6px 14px;font-size:.72rem;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:5px;}

/* ══════ SELECT ══════ */
#select-screen{gap:22px;max-width:640px;width:100%;margin:auto;}
.sel-header{text-align:center;}
.sel-title{font-family:'Space Grotesk',sans-serif;font-size:1.9rem;font-weight:700;margin-bottom:5px;}
.sel-sub{font-size:.9rem;color:var(--text2);}
.animal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;}
.a-card{background:var(--card);border:2px solid var(--border2);border-radius:var(--r);padding:18px 8px 14px;cursor:pointer;text-align:center;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.a-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,109,250,.0),rgba(124,109,250,.08));opacity:0;transition:opacity .25s;}
.a-card:hover{border-color:var(--accent);transform:translateY(-5px);box-shadow:0 12px 30px rgba(124,109,250,.2);}
.a-card:hover::before{opacity:1;}
.a-card.selected{border-color:var(--accent);background:rgba(124,109,250,.1);box-shadow:0 0 0 4px rgba(124,109,250,.15),0 12px 30px rgba(124,109,250,.25);transform:translateY(-5px);}
.a-card.selected::after{content:'✓';position:absolute;top:7px;right:9px;width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-size:.6rem;font-weight:900;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;}
.a-emo{font-size:2.8rem;display:block;margin-bottom:8px;}
.a-card:hover .a-emo,.a-card.selected .a-emo{animation:emoJ .5s ease-in-out infinite alternate;}
@keyframes emoJ{from{transform:translateY(0)}to{transform:translateY(-7px)}}
.a-nm{font-size:.78rem;font-weight:800;}
.a-type{font-size:.68rem;color:var(--text3);margin-top:2px;}
.a-trait{font-size:.6rem;color:var(--accentH);margin-top:3px;font-weight:700;}
@keyframes cardAppear{from{opacity:0;transform:translateY(14px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}

/* personality chips */
.personality-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.p-chip{padding:5px 12px;border-radius:50px;font-size:.65rem;font-weight:800;border:1px solid;cursor:pointer;transition:all .2s;}
.p-chip.sel{box-shadow:0 0 12px currentColor;}

.name-section{text-align:center;width:100%;}
.name-lbl{font-size:.7rem;font-weight:800;color:var(--text2);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:10px;}
.name-field{width:100%;max-width:300px;background:var(--card);border:2px solid var(--border2);border-radius:50px;padding:13px 22px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:var(--text);text-align:center;outline:none;transition:all .25s;}
.name-field::placeholder{color:var(--text3);}
.name-field:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(124,109,250,.15);}
.begin-btn{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;padding:14px 36px;border:none;border-radius:50px;background:linear-gradient(135deg,var(--accent),#5a4de8);color:#fff;cursor:pointer;transition:all .3s;opacity:.35;pointer-events:none;box-shadow:0 6px 20px rgba(124,109,250,.3);}
.begin-btn.on{opacity:1;pointer-events:all;box-shadow:0 8px 30px rgba(124,109,250,.5);}
.begin-btn.on:hover{transform:translateY(-2px) scale(1.03);}

/* ══════ GAME ══════ */
#game-screen{padding:12px;justify-content:flex-start;padding-top:14px;}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:10px 18px;width:100%;max-width:1000px;margin-bottom:12px;gap:10px;flex-wrap:wrap;}
.top-left{display:flex;align-items:center;gap:10px;}
.top-pet-name{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;}
.top-stage{font-size:.68rem;font-weight:800;background:rgba(124,109,250,.12);border:1px solid rgba(124,109,250,.25);border-radius:20px;padding:3px 10px;color:var(--accentH);}
.top-trait{font-size:.62rem;font-weight:700;border-radius:20px;padding:3px 9px;border:1px solid;}
.top-right{display:flex;align-items:center;gap:16px;}
.top-coins{display:flex;align-items:center;gap:5px;font-weight:800;color:var(--yellow);font-size:.95rem;}
.top-mood{font-size:1.2rem;}
.top-time{font-size:.75rem;font-weight:700;color:var(--text3);display:flex;align-items:center;gap:5px;}
.tod-icon{font-size:.9rem;}
.top-level{font-size:.68rem;font-weight:800;color:var(--green);background:rgba(38,217,127,.1);border:1px solid rgba(38,217,127,.25);border-radius:20px;padding:3px 9px;}

/* GAME WRAP */
.game-wrap{display:grid;grid-template-columns:230px 1fr 270px;gap:12px;width:100%;max-width:1000px;align-items:start;}
.g-panel{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:16px;}
.g-panel-title{font-size:.62rem;font-weight:800;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:13px;display:flex;align-items:center;gap:7px;}
.g-panel-title::before{content:'';width:3px;height:12px;background:var(--accent);border-radius:2px;display:inline-block;}

/* STATS */
.stats-list{display:flex;flex-direction:column;gap:10px;}
.stat-row{display:flex;align-items:center;gap:8px;}
.s-ico{font-size:.95rem;width:20px;text-align:center;flex-shrink:0;}
.s-lbl{font-size:.66rem;font-weight:700;color:var(--text2);width:60px;flex-shrink:0;}
.s-track{flex:1;height:7px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;}
.s-fill{height:100%;border-radius:10px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.sf-h{background:linear-gradient(90deg,#ef5350,#ff7043);}
.sf-p{background:linear-gradient(90deg,#ffca28,#ffa726);}
.sf-e{background:linear-gradient(90deg,#42a5f5,#26c6da);}
.sf-c{background:linear-gradient(90deg,#ec407a,#ab47bc);}
.sf-hp{background:linear-gradient(90deg,#26d97f,#00bcd4);}
.sf-xp{background:linear-gradient(90deg,#7c6dfa,#f06292);}
.s-num{font-size:.63rem;font-weight:800;width:26px;text-align:right;color:var(--text2);}

/* XP BAR */
.xp-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.xp-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.xp-lv-txt{font-size:.65rem;font-weight:800;color:var(--accentH);}
.xp-num-txt{font-size:.62rem;color:var(--text3);font-weight:700;}

/* MOOD CARD */
.mood-card{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r2);padding:10px;margin-top:10px;text-align:center;}
.mood-big{font-size:2.2rem;margin-bottom:3px;animation:moodPop 2s ease-in-out infinite;}
@keyframes moodPop{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.mood-txt{font-size:.7rem;font-weight:700;color:var(--text2);}
.mood-personality{font-size:.62rem;color:var(--text3);margin-top:2px;}

/* ACTIONS */
.act-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.ab{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r2);padding:10px 5px;cursor:pointer;color:var(--text);font-family:'Nunito',sans-serif;font-size:.68rem;font-weight:800;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;}
.ab .aico{font-size:1.4rem;}
.ab .acost{font-size:.5rem;color:var(--yellow);font-weight:700;}
.ab:hover{transform:translateY(-2px);}
.ab:disabled{opacity:.25;cursor:not-allowed;transform:none;}
.ab.feed-b:hover{background:rgba(239,83,80,.12);border-color:#ef5350;}
.ab.play-b:hover{background:rgba(255,202,40,.1);border-color:var(--yellow);}
.ab.sleep-b:hover{background:rgba(66,165,245,.1);border-color:var(--blue);}
.ab.heal-b:hover{background:rgba(38,217,127,.1);border-color:var(--green);}
.ab.bath-b:hover{background:rgba(236,64,122,.12);border-color:#ec407a;}
.ab.walk-b:hover{background:rgba(124,109,250,.1);border-color:var(--accent);}

/* CENTER */
.center-col{display:flex;flex-direction:column;align-items:center;gap:11px;}

/* PET WINDOW */
.pet-window{width:240px;height:240px;background:var(--card);border:1px solid var(--border2);border-radius:28px;position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column;overflow:visible;transition:box-shadow .5s;}
/* spinning conic border */
@property --a{syntax:'<angle>';initial-value:0deg;inherits:false;}
.pet-window::before{content:'';position:absolute;inset:-1px;border-radius:29px;
  background:conic-gradient(from var(--a,0deg),var(--accent) 0%,transparent 30%,transparent 70%,var(--pink) 100%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;padding:1.5px;
  animation:bSpin 4s linear infinite;}
@keyframes bSpin{to{--a:360deg}}
.pet-window.night-mode{background:#0d1022;}
.pet-window.night-mode::before{background:conic-gradient(from var(--a,0deg),#6baaff 0%,transparent 30%,transparent 70%,#9d91ff 100%);}

.pet-bg-aura{position:absolute;inset:0;border-radius:28px;opacity:0;transition:opacity 1s;pointer-events:none;}
.pet-bg-aura.happy{background:radial-gradient(circle at 50% 60%,rgba(255,202,40,.08) 0%,transparent 70%);opacity:1;}
.pet-bg-aura.sad{background:radial-gradient(circle at 50% 60%,rgba(66,165,245,.06) 0%,transparent 70%);opacity:1;}
.pet-bg-aura.sick{background:radial-gradient(circle at 50% 60%,rgba(0,255,0,.05) 0%,transparent 70%);opacity:1;}
.pet-bg-aura.danger{background:radial-gradient(circle at 50% 60%,rgba(239,83,80,.12) 0%,transparent 60%);opacity:1;}

.weather-layer{position:absolute;inset:0;border-radius:28px;pointer-events:none;overflow:hidden;opacity:0;transition:opacity 1s;}
.weather-layer.on{opacity:1;}
.weather-layer .w-particle{position:absolute;font-size:.8rem;animation:wFall linear infinite;}
@keyframes wFall{from{transform:translateY(-10px) rotate(0)}to{transform:translateY(260px) rotate(360deg)}}

.pet-skin-layer{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:2.6rem;pointer-events:none;z-index:10;
  animation:skinF 3s ease-in-out infinite;filter:drop-shadow(0 0 8px rgba(255,215,0,.8));display:none;line-height:1;}
@keyframes skinF{0%,100%{transform:translateX(-50%) translateY(0) rotate(-3deg);}50%{transform:translateX(-50%) translateY(-6px) rotate(3deg);}}
.pet-skin-layer.skin-pop{animation:skinPop .4s cubic-bezier(.17,.67,.35,1.5) forwards,skinF 3s ease-in-out .4s infinite;}
@keyframes skinPop{0%{transform:translateX(-50%) scale(0) rotate(-20deg);opacity:0;}60%{transform:translateX(-50%) scale(1.3) rotate(5deg);opacity:1;}100%{transform:translateX(-50%) scale(1) rotate(-3deg);opacity:1;}}

.pet-activity-bubble{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);border-radius:12px 12px 0 12px;padding:5px 9px;font-size:1.1rem;pointer-events:none;opacity:0;transform:scale(0);transform-origin:top right;transition:opacity .3s,transform .3s cubic-bezier(.17,.67,.35,1.4);z-index:3;}
.pet-activity-bubble.show{opacity:1;transform:scale(1);}
.pet-activity-text{position:absolute;bottom:9px;left:0;right:0;text-align:center;font-size:.72rem;font-weight:700;color:rgba(255,255,255,.5);pointer-events:none;opacity:0;transition:opacity .4s;z-index:3;}
.pet-activity-text.show{opacity:1;}

.pet-big{font-size:5rem;cursor:pointer;user-select:none;display:inline-block;filter:drop-shadow(0 0 12px rgba(124,109,250,.3));transition:filter .3s;}
.pet-big:active{transform:scale(.82) rotate(-15deg)!important;}

/* pet animations */
.pet-big.state-idle   {animation:pIdle 3s ease-in-out infinite;}
.pet-big.state-walk   {animation:pWalk .6s ease-in-out infinite;}
.pet-big.state-scratch{animation:pScratch .4s ease-in-out infinite;}
.pet-big.state-spin   {animation:pSpin .8s ease-in-out 2;}
.pet-big.state-sit    {animation:pSit 4s ease-in-out infinite;}
.pet-big.state-blink  {animation:pBlink .1s step-end 3;}
.pet-big.state-sneeze {animation:pSneeze .3s ease-in-out 2;}
.pet-big.state-dance  {animation:pDance .5s ease-in-out infinite;}
.pet-big.state-flip   {animation:pFlip .6s ease-in-out 2;}
.pet-big.pet-sad   {animation:pShake .5s ease-in-out infinite;filter:drop-shadow(0 0 10px rgba(66,165,245,.5)) saturate(.5);}
.pet-big.pet-happy {animation:pJoy .4s ease-in-out 4;filter:drop-shadow(0 0 22px rgba(255,215,0,.8));}
.pet-big.pet-sick  {animation:pSick 1.5s ease-in-out infinite;filter:drop-shadow(0 0 10px rgba(0,255,0,.5)) hue-rotate(60deg) brightness(.75);}
.pet-big.pet-sleep {animation:pSleep 3s ease-in-out infinite;filter:drop-shadow(0 0 8px rgba(107,170,255,.4));}
.pet-big.pet-danger{animation:pDanger .25s ease-in-out infinite;filter:drop-shadow(0 0 22px rgba(255,50,50,.95)) brightness(1.2);}
.pet-big.pet-run   {animation:pRun .3s linear infinite;}
@keyframes pIdle{0%,100%{transform:translateY(0) rotate(-1deg) scale(1);}40%{transform:translateY(-12px) rotate(1deg) scale(1.04);}70%{transform:translateY(-7px) rotate(0)}}
@keyframes pWalk{0%{transform:translateX(-5px) rotate(-5deg);}50%{transform:translateX(5px) rotate(5deg);}100%{transform:translateX(-5px) rotate(-5deg);}}
@keyframes pScratch{0%,100%{transform:rotate(0);}25%{transform:rotate(-10deg) translateY(-2px);}75%{transform:rotate(10deg) translateY(2px);}}
@keyframes pSpin{0%{transform:rotate(0) scale(1);}50%{transform:rotate(180deg) scale(1.1);}100%{transform:rotate(360deg) scale(1);}}
@keyframes pSit{0%,100%{transform:translateY(0) scale(1,1);}50%{transform:translateY(5px) scale(1.06,.93);}}
@keyframes pBlink{0%,100%{transform:scaleY(1);}50%{transform:scaleY(.08);}}
@keyframes pSneeze{0%,100%{transform:rotate(0);}30%{transform:rotate(-18deg) translateX(-5px);}60%{transform:rotate(12deg) translateX(9px);}}
@keyframes pDance{0%,100%{transform:rotate(-8deg) translateY(0);}25%{transform:rotate(8deg) translateY(-8px);}75%{transform:rotate(-4deg) translateY(-4px);}}
@keyframes pFlip{0%{transform:scale(1) rotate(0);}50%{transform:scale(1.15) rotate(180deg);}100%{transform:scale(1) rotate(360deg);}}
@keyframes pShake{0%,100%{transform:rotate(0);}25%{transform:rotate(-9deg);}75%{transform:rotate(9deg);}}
@keyframes pJoy{0%,100%{transform:scale(1);}50%{transform:scale(1.28) translateY(-18px);}}
@keyframes pSick{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(6px) rotate(3deg);}}
@keyframes pSleep{0%,100%{transform:translateY(0) rotate(-6deg) scale(.94);}50%{transform:translateY(-6px) rotate(-6deg) scale(.94);}}
@keyframes pDanger{0%,100%{transform:scale(1) rotate(0);}25%{transform:scale(1.17) rotate(-6deg);}75%{transform:scale(1.17) rotate(6deg);}}
@keyframes pRun{0%{transform:translateX(-9px) scaleX(1);}50%{transform:translateX(9px) scaleX(-1);}100%{transform:translateX(-9px) scaleX(1);}}

/* STA
